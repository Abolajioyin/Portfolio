services:
  - type: web
    name: auth-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
```

Commit it directly to main.

---

## Step 2: Create your Render account

1. Go to **render.com**
2. Sign up with your **GitHub account** — this is important, it links your repos automatically
3. Verify your email

---

## Step 3: Deploy

1. In Render dashboard click **New → Web Service**
2. Select your `auth-service` repo
3. Render will detect the `render.yaml` automatically
4. Click **Deploy**

It takes about 3-5 minutes. You'll get a live URL like `https://auth-service-xxxx.onrender.com`

---

## Step 4: Test it's alive

Once deployed, visit:
```
https://your-render-url.onrender.com/docs
